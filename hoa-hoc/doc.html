<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hóa Học THCS Toàn Tập — Bài Đọc</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #e74c3c; }

body {
  background: #140606;
  color: #ddd;
  font-family: 'Comic Neue', 'Comic Sans MS', cursive;
  min-height: 100vh;
}

/* TOP BAR */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #140606ee;
  backdrop-filter: blur(8px);
  border-bottom: 1px solid #1a1a1a;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.topbar-back {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #555;
  text-decoration: none;
  font-size: .85em;
  white-space: nowrap;
  transition: color .2s;
}
.topbar-back:hover { color: var(--accent); }
.topbar-title {
  color: #444;
  font-size: .82em;
  flex: 1;
}
.topbar-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--accent);
  color: #fff;
  border-radius: 6px;
  font-size: .8em;
  font-weight: 700;
  text-decoration: none;
  white-space: nowrap;
  transition: opacity .15s;
}
.topbar-btn:hover { opacity: .85; }

/* CONTENT */
.content {
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  line-height: 1.8;
  font-size: 1em;
}

/* Loading */
.loading {
  text-align: center;
  padding: 80px 24px;
  color: #444;
}
.loading-icon { font-size: 3em; margin-bottom: 16px; display: block; }

/* Markdown styles */
.content h1 {
  font-size: 2em;
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
  padding-bottom: 10px;
  margin: 48px 0 20px;
  line-height: 1.2;
}
.content h1:first-child { margin-top: 0; }
.content h2 {
  font-size: 1.4em;
  color: #ddd;
  margin: 36px 0 14px;
  border-left: 4px solid var(--accent);
  padding-left: 12px;
}
.content h3 {
  font-size: 1.1em;
  color: #aaa;
  margin: 24px 0 10px;
  font-style: italic;
}
.content p {
  margin-bottom: 14px;
  color: #bbb;
}
.content strong { color: #eee; }
.content em { color: #aaa; }
.content hr {
  border: none;
  border-top: 1px solid #1e1e1e;
  margin: 40px 0;
}
.content blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  margin: 16px 0;
  background: #ffffff08;
  border-radius: 0 6px 6px 0;
  color: #999;
  font-style: italic;
}
.content code {
  background: #1a1a1a;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: monospace;
  color: var(--accent);
  font-size: .9em;
}
.content ul, .content ol {
  padding-left: 24px;
  margin-bottom: 14px;
  color: #bbb;
}
.content li { margin-bottom: 4px; }
.content a { color: var(--accent); }

/* Progress bar */
.progress-wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  z-index: 200;
  background: transparent;
}
.progress-bar {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width .1s;
}

/* Back to top */
.back-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 1.2em;
  cursor: pointer;
  opacity: 0;
  transition: opacity .3s;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
.back-top.visible { opacity: 1; }
.back-top:hover { opacity: .8; }
</style>
</head>
<body>

<div class="progress-wrap"><div class="progress-bar" id="prog"></div></div>

<nav class="topbar">
  <a href="/" class="topbar-back">← Trang chủ</a>
  <span class="topbar-title">⚗️ Hóa Học THCS Toàn Tập</span>
  <a href="index.html" class="topbar-btn">🎨 Xem comic</a>
</nav>

<div class="content" id="content">
  <div class="loading">
    <span class="loading-icon">⚗️</span>
    <p>Đang tải bài đọc...</p>
  </div>
</div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// Progress bar + back-to-top
window.addEventListener('scroll', () => {
  const scrolled = window.scrollY;
  const total = document.documentElement.scrollHeight - window.innerHeight;
  document.getElementById('prog').style.width = (scrolled / total * 100) + '%';
  document.getElementById('backTop').classList.toggle('visible', scrolled > 400);
});

// Load and render markdown
fetch('./content.md')
  .then(r => {
    if (!r.ok) throw new Error('Failed to load');
    return r.text();
  })
  .then(md => {
    marked.setOptions({ breaks: true, gfm: true });
    document.getElementById('content').innerHTML = marked.parse(md);
  })
  .catch(err => {
    document.getElementById('content').innerHTML =
      '<p style="color:#e74c3c; padding:40px 0;">Không thể tải bài đọc. Lỗi: ' + err.message + '</p>';
  });
</script>
</body>
</html>
